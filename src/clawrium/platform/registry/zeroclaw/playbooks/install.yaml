---
- hosts: all
  become: yes
  tasks:
    - name: Create claw user
      ansible.builtin.user:
        name: "zc-{{ inventory_hostname }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Clone ZeroClaw repository
      ansible.builtin.git:
        repo: https://github.com/zeroclaw/zeroclaw.git
        dest: "/home/zc-{{ inventory_hostname }}/zeroclaw"
        version: "{{ claw_version | default('v0.2.0') }}"
      become_user: "zc-{{ inventory_hostname }}"

    - name: Install npm dependencies
      ansible.builtin.command:
        cmd: npm install
        chdir: "/home/zc-{{ inventory_hostname }}/zeroclaw"
      become_user: "zc-{{ inventory_hostname }}"

    - name: Create workspace directory
      ansible.builtin.file:
        path: "/home/zc-{{ inventory_hostname }}/workspace"
        state: directory
        owner: "zc-{{ inventory_hostname }}"
        group: "zc-{{ inventory_hostname }}"
        mode: "0700"
