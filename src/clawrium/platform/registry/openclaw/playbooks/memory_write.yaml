---
# Openclaw memory write — drops content into ~/.openclaw/workspace/<filename>.
# Structural allowlist mirrors _MEMORY_WRITE_ALLOWED_FILES['openclaw']
# plus memory/<file> daily notes. Defense-in-depth: catches a tampered
# Ansible inventory that bypasses Python guards.
- hosts: all
  become: yes
  gather_facts: false
  vars:
    openclaw_writable_files:
      - SOUL.md
      - IDENTITY.md
      - USER.md
      - TOOLS.md
  tasks:
    - name: Validate agent_name (defense-in-depth)
      ansible.builtin.fail:
        msg: "Invalid agent_name"
      when:
        - agent_name is not match('^[a-z][a-z0-9_-]{0,31}$')

    - name: Validate memory filename pattern
      ansible.builtin.fail:
        msg: "Invalid memory filename"
      when:
        - memory_filename is not match('^[A-Za-z0-9._-]+(/[A-Za-z0-9._-]+)?$')

    - name: Reject path-traversal components
      ansible.builtin.fail:
        msg: "Invalid memory filename: traversal components not allowed"
      when:
        - memory_filename.split('/') | intersect(['', '.', '..']) | length > 0

    - name: Restrict to openclaw personality + daily-notes allowlist
      ansible.builtin.fail:
        msg: >-
          openclaw memory write rejects '{{ memory_filename }}'. Allowed:
          one of {{ openclaw_writable_files | join(', ') }}
          or memory/<file>.
      when:
        - memory_filename not in openclaw_writable_files
        - not (memory_filename is match('^memory/[A-Za-z0-9._-]+$'))

    - name: Ensure workspace directory exists
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.openclaw/workspace"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Ensure memory subdirectory exists when needed
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.openclaw/workspace/memory"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"
      when: memory_filename is match('^memory/.*$')

    - name: Write memory file content
      # Content is passed as base64 from Python so user-supplied bytes are
      # never interpreted as Jinja2. Decoding via the b64decode filter
      # produces the literal payload without re-templating.
      ansible.builtin.copy:
        content: "{{ memory_content_b64 | b64decode }}"
        dest: "/home/{{ agent_name }}/.openclaw/workspace/{{ memory_filename }}"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
      no_log: true
